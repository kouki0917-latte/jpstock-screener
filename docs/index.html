<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本株ブレイクアウトスクリーナー</title>
  <style>
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 1.8rem;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    p { color: #94a3b8; font-size: 1rem; line-height: 1.8; }
    .badge {
      display: inline-block;
      margin-top: 24px;
      background: #1e1b4b;
      border: 1px solid #3730a3;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: #a5b4fc;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🚀 日本株 ブレイクアウトスクリーナー</h1>
    <p>
      GitHub Actionsが毎日 06:00 JST に自動実行します。<br>
      初回実行後にスクリーニング結果が表示されます。<br>
      右上の「Actions」タブから手動実行もできます。
    </p>
    <div class="badge">⏳ 初回データ生成待ち — Actions タブから手動実行してください</div>
  </div>
</body>
</html>
